# Swarm deployment for labextend.
#
# Two services, one image:
#   - labextend-leader: replicas:1, pinned to node.labels.labextend_leader == true.
#                       Runs HTTP UI :8080 + gRPC :9090; also acts as local agent.
#   - labextend-agent:  mode: global. Agent on every other Linux node. Skipped
#                       on the leader's node (the leader's in-process agent
#                       loop already covers it).
#
# Pre-deploy:
#   docker node update --label-add labextend_leader=true <leader-node-id>
#   export BPM_AGENT_TOKEN=$(openssl rand -hex 32)
#   export BPM_SECRETS_KEY=$(openssl rand -hex 32)
#   export BPM_TOTP_KEY=$(openssl rand -hex 32)
#   docker stack deploy -c docker-stack.yml labextend

version: "3.9"

services:
  labextend-agent:
    image: ghcr.io/bartis-dev/labextend:latest
    deploy:
      mode: global
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.platform.os == linux
          - node.labels.labextend_leader != true
      resources:
        limits:
          memory: 256M
    environment:
      LEADER_ADDR: "labextend-leader:9090"
      BPM_AGENT_TOKEN: "${BPM_AGENT_TOKEN}"
      BPM_AGENT_LABELS: "role=worker"
      BPM_LOG_LEVEL: "info"
      BPM_HEARTBEAT_INTERVAL: "5s"
      BPM_DOCKER_SOCKET: "/host/var/run/docker.sock"
    volumes:
      - /:/host:rslave
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      - /etc/cron.d:/etc/cron.d
      - labextend-agent-data:/data
    networks:
      - labextend-net

  labextend-leader:
    image: ghcr.io/bartis-dev/labextend:latest
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.labextend_leader == true
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 512M
    environment:
      LEADER: "true"
      HTTP_ADDR: ":8080"
      GRPC_ADDR: ":9090"
      EXTERNAL_URL: "${EXTERNAL_URL:-https://labextend.bartis.dev}"
      BPM_AGENT_TOKEN: "${BPM_AGENT_TOKEN}"
      BPM_SECRETS_KEY: "${BPM_SECRETS_KEY}"
      BPM_TOTP_KEY: "${BPM_TOTP_KEY}"
      SESSION_SECURE_COOKIE: "true"
      BPM_LOG_LEVEL: "info"
      BPM_LOG_MAX_LINES: "5000"          # per container ringbuffer cap
      BPM_LOG_RETENTION_HOURS: "0"       # 0 = no time-based prune (cap-only)
      BPM_METRIC_RETENTION_HOURS: "168"  # 7 days of minute buckets
      BPM_DOCKER_SOCKET: "/host/var/run/docker.sock"
    ports:
      - target: 8080
        published: 8080
        protocol: tcp
        mode: ingress
      - target: 9090
        published: 9090
        protocol: tcp
        mode: ingress
    volumes:
      - /:/host:rslave
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      - /etc/cron.d:/etc/cron.d
      - labextend-leader-data:/data
    networks:
      - labextend-net

networks:
  labextend-net:
    driver: overlay
    attachable: true

volumes:
  labextend-leader-data:
  labextend-agent-data:
